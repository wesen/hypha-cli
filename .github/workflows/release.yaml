on:
  workflow_dispatch:

  push:
    # run only against tags
    tags:
      - '*'

permissions:
  contents: write
  # Enable this when the disabled publish-docs template job below is turned on.
  # id-token: write
  # packages: write
  # issues: write


jobs:
  goreleaser-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - name: Install arm64 cross-compiler
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu g++-aarch64-linux-gnu
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: linux
      - uses: actions/upload-artifact@v4
        with:
          name: dist-linux
          path: dist

  goreleaser-darwin:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: release --clean --split
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          GGOOS: darwin
      - uses: actions/upload-artifact@v4
        with:
          name: dist-darwin
          path: dist

  # Disabled template for publishing Glazed help docs to docs.yolo.scapegoat.dev.
  #
  # To enable this in a generated repository:
  # 1. Replace XXX with the package/binary name.
  # 2. Ensure the binary can export help with the command below, or adjust export_command.
  # 3. Add a matching Vault role in Terraform, for example docsctl-XXX-publisher.
  # 4. Uncomment `id-token: write` in the top-level permissions block.
  # 5. Change the `if:` guard to: ${{ startsWith(github.ref, 'refs/tags/v') }}
  publish-docs:
    name: Publish docs
    needs:
      - goreleaser-merge
    if: ${{ false && startsWith(github.ref, 'refs/tags/v') }}
    uses: go-go-golems/infra-tooling/.github/workflows/publish-docsctl.yml@main
    with:
      package_name: XXX
      package_version: ${{ github.ref_name }}
      export_command: go run ./cmd/XXX help export --format sqlite --output-path .docsctl/help.sqlite
      sqlite_path: .docsctl/help.sqlite
      docsctl_install_command: go install github.com/go-go-golems/glazed/cmd/docsctl@latest
      vault_role: docsctl-XXX-publisher
      vault_token_role: docsctl-XXX-publisher
      registry_url: https://docs-registry.yolo.scapegoat.dev
      verify_packages_url: https://docs.yolo.scapegoat.dev/api/packages
      verify_publish: true

  goreleaser-merge:
    runs-on: ubuntu-latest
    environment: release
    needs:
      - goreleaser-linux
      - goreleaser-darwin
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - run: git fetch --force --tags
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache: true
      - uses: actions/download-artifact@v4
        with:
          path: dist-parts
      - name: Merge dist artifacts
        run: |
          rm -rf dist
          mkdir -p dist
          for part in dist-linux dist-darwin; do
            if [ -d "dist-parts/${part}/dist" ]; then
              cp -a "dist-parts/${part}/dist/." dist/
            else
              cp -a "dist-parts/${part}/." dist/
            fi
          done
      - name: Import GPG key
        id: import_gpg
        uses: crazy-max/ghaction-import-gpg@v6
        with:
          gpg_private_key: ${{ secrets.GO_GO_GOLEMS_SIGN_KEY }}
          passphrase: ${{ secrets.GO_GO_GOLEMS_SIGN_PASSPHRASE }}
          fingerprint: "6EBE1DF0BDF48A1BBA381B5B79983EF218C6ED7E"
      - uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser-pro
          version: "~> v2"
          args: continue --merge
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GORELEASER_KEY: ${{ secrets.GORELEASER_KEY }}
          COSIGN_PWD: ${{ secrets.COSIGN_PWD }}
          TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          GPG_FINGERPRINT: ${{ steps.import_gpg.outputs.fingerprint }}
          FURY_TOKEN: ${{ secrets.FURY_TOKEN }}
